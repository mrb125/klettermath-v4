  B1: {
    cat:'Parameterdarstellung', title:'Hindernischeck',
    twoRopes: false,
    vorschrift:'§6 — Kein Hindernis darf sich auf dem Seilpfad befinden (Parameterwert t prüfen).',
    variant:'blind',
    genScen(rid){
      const key=APP.ruleRopes[rid]; if(!key) return {};
      const rope=APP.ropes.find(r=>ropeKey(r)===key); if(!rope) return {};
      const sv=platPt(rope.from), d=V.sub(platPt(rope.to),sv);
      const onLine=Math.random()>0.5;
      const t=+(0.25+Math.random()*0.5).toFixed(2);
      const base=[sv[0]+t*d[0], sv[1]+t*d[1], sv[2]+t*d[2]];
      let P;
      if(onLine){
        P=base.map(x=>Math.round(x*10)/10);
      } else {
        // Versatz senkrecht zur Seilrichtung
        let perp=V.cross(d,[0,1,0]);
        if(V.len(perp)<0.1) perp=V.cross(d,[1,0,0]);
        const pu=V.unit(perp);
        const off=1+Math.round(Math.random()); // 1 oder 2
        P=[
          Math.round((base[0]+pu[0]*off)*10)/10,
          Math.round((base[1]+pu[1]*off)*10)/10,
          Math.round((base[2]+pu[2]*off)*10)/10,
        ];
      }
      return { P };
    },
    ctx(rid){
      const rd=getRd1(rid); if(!rd) return '';
      const sc=APP.ruleScen[rid]; if(!sc?.P) return `Seil ${rd.lbl} gewählt — Szenario lädt…`;
      const [px,py,pz]=sc.P;
      return `Vorschrift §6: Kein Hindernis darf im Seilpfad stehen.<br>
        Seilgerade: g: x⃗ = ${V.str(rd.sv)} + t · ${V.str(rd.d)}<br>
        Ein Baum steht bei <b>P(${px}|${py}|${pz})</b>. Liegt er auf dem Seilpfad?`;
    },
    inputs:[
      { type:'radio', id:'on', label:'Liegt P auf dem Seilpfad?',
        opts:[{v:'ja',l:'Ja'},{v:'nein',l:'Nein'}] },
      { type:'num', id:'t', label:'Falls ja: Parameterwert t', step:0.001,
        hint:'Leer lassen wenn Nein' },
    ],
    check(rid, vals){
      const rd=getRd1(rid); if(!rd) return errR('Erst Seil wählen');
      const sc=APP.ruleScen[rid]; if(!sc?.P) return errR('Szenario fehlt');
      const {sv,d}=rd, P=sc.P;
      let tc=null;
      for(let i=0;i<3;i++){ if(Math.abs(d[i])>0.001){tc=(P[i]-sv[i])/d[i];break;} }
      const eol=tc!==null&&[0,1,2].every(i=>Math.abs(sv[i]+tc*d[i]-P[i])<0.05);
      const uon=vals.on==='ja', radOk=uon===eol;
      const tent=parseFloat(vals.t), tOk=!uon||(eol&&!isNaN(tent)&&Math.abs(tent-tc)<0.05);
      const steps=[`g: x⃗ = ${V.str(sv)} + t · ${V.str(d)}`, `P = (${P.join('|')})`];
      for(let i=0;i<3;i++) if(Math.abs(d[i])>0.001){
        const ti=(P[i]-sv[i])/d[i];
        steps.push(`  ${['x','y','z'][i]}-Komp.: t = (${n2(P[i])} − ${n2(sv[i])}) ÷ ${n2(d[i])} = ${n2(ti)}`);
      }
      if(tc!==null){
        steps.push(eol ? `Probe mit t=${n2(tc)}:` : `Widerspruch → P liegt nicht auf g`);
        if(eol) [0,1,2].forEach(i=>{
          const v=sv[i]+tc*d[i];
          steps.push(`  ${['x','y','z'][i]}: ${n2(v)} ${Math.abs(v-P[i])<0.05?'✓':'✗ ≠ '+n2(P[i])}`);
        });
      }
      steps.push(eol?`⟹ Baum liegt auf Seilpfad (t = ${n2(tc)})`:`⟹ Baum liegt NICHT auf Seilpfad`);
      if(!radOk) steps.push(`✗ Antwort falsch — korrekt: ${eol?'Ja':'Nein'}`);
      else if(!tOk) steps.push(`✗ t-Wert falsch — erwartet: ${n2(tc)}`);
      else steps.push(`✓ Korrekt!`);
      return { ok:radOk&&tOk, steps:steps.join('\n') };
    }
  },

  F1: {
    cat:'Abstand', title:'Sicherheitsabstand',
    twoRopes: false,
    vorschrift:'§7 — Mindestabstand jedes Objekts zum Seilpfad: 3 m (Lotfußpunkt berechnen).',
    variant:'fehler',
    genScen(rid){
      const key=APP.ruleRopes[rid]; if(!key) return {};
      const rope=APP.ropes.find(r=>ropeKey(r)===key); if(!rope) return {};
      const sv=platPt(rope.from), d=V.sub(platPt(rope.to),sv);
      const t0=+(0.2+Math.random()*0.6).toFixed(2);
      const base=[sv[0]+t0*d[0], sv[1]+t0*d[1], sv[2]+t0*d[2]];
      let perp=V.cross(d,[0,1,0]);
      if(V.len(perp)<0.1) perp=V.cross(d,[1,0,0]);
      const pu=V.unit(perp);
      const distP=2+Math.floor(Math.random()*3);
      const P=[
        Math.round((base[0]+pu[0]*distP)*2)/2,
        Math.round((base[1]+pu[1]*distP)*2)/2,
        Math.round((base[2]+pu[2]*distP)*2)/2,
      ];
      // Korrekte Rechnung
      const d2=V.dot(d,d), dlen=V.len(d);
      const num=V.dot(V.sub(P,sv),d);
      const tc=num/d2;
      const F=[sv[0]+tc*d[0], sv[1]+tc*d[1], sv[2]+tc*d[2]];
      const dist=V.len(V.sub(P,F));
      // Fehler: ÷|d| statt ÷|d|²
      const tcW=num/dlen;
      const Fw=[sv[0]+tcW*d[0], sv[1]+tcW*d[1], sv[2]+tcW*d[2]];
      const distW=V.len(V.sub(P,Fw));
      return {
        P,
        fehlerLines:[
          `Schritt 1:  (P − sv) · d⃗ = ${V.str(V.sub(P,sv))} · ${V.str(d)} = ${n2(num)}`,
          `Schritt 2:  t = ${n2(num)} ÷ |d⃗| = ${n2(num)} ÷ ${n2(dlen)} = ${n2(tcW)}`,
          `Schritt 3:  F = ${V.str(sv)} + ${n2(tcW)} · ${V.str(d)} = ${V.str(Fw.map(x=>Math.round(x*100)/100))}`,
          `Schritt 4:  |PF| = ${n2(distW)} m`,
        ],
        fehlerIdx:1,
        fehlerExpl:`Schritt 2: Nenner muss |d⃗|² = ${n2(d2)} sein, nicht |d⃗| = ${n2(dlen)}.\nt = ${n2(num)} ÷ ${n2(d2)} = ${n2(tc)},   F = ${V.str(F.map(x=>Math.round(x*100)/100))},   |PF| = ${n2(dist)} m`,
      };
    },
    ctx(rid){
      const rd=getRd1(rid); if(!rd) return '';
      const sc=APP.ruleScen[rid]; if(!sc?.P) return 'Seil wählen…';
      return `Vorschrift §7: Kein Objekt darf dem Seilpfad auf <b>weniger als 3 m</b> nahekommen.<br>
        Seilgerade: g: x⃗ = ${V.str(rd.sv)} + t · ${V.str(rd.d)}<br>
        Eine Überwachungskamera steht bei <b>P${V.str(sc.P)}</b>.<br>
        Berechne den Lotfußpunkt F auf g und den Abstand |PF|.`;
    },
    inputs:[
      { type:'num',  id:'t', label:'Parameterwert t des Lotfußpunkts', step:0.001 },
      { type:'vec3', id:'F', label:'Lotfußpunkt F', hint:'Komponenten auf 2 Dezimalstellen runden' },
      { type:'num',  id:'dist', label:'Abstand |PF|', unit:'m', step:0.01 },
      { type:'radio', id:'urteil', label:'TÜV-Urteil',
        opts:[{v:'pass',l:'✓ Zulässig (≥ 3 m)'},{v:'fail',l:'✗ Nicht zulässig (< 3 m)'}] },
    ],
    check(rid, vals){
      const rd=getRd1(rid); if(!rd) return errR('Erst Seil wählen');
      const sc=APP.ruleScen[rid]; if(!sc?.P) return errR('Szenario fehlt');
      const {sv,d}=rd, P=sc.P;
      const d2=V.dot(d,d);
      const tc=V.dot(V.sub(P,sv),d)/d2;
      const F=[sv[0]+tc*d[0], sv[1]+tc*d[1], sv[2]+tc*d[2]];
      const PFvec=V.sub(P,F), dist=V.len(PFvec);
      const Frnd=F.map(x=>Math.round(x*100)/100);

      const entT=parseFloat(vals.t);
      const entF=vals.F.map(parseFloat);
      const entD=parseFloat(vals.dist);
      const tOk=Math.abs(entT-tc)<0.05;
      const fOk=V.eq3(entF,Frnd,0.11);
      const dOk=Math.abs(entD-dist)<0.12;
      const rok=dist>=3;
      const uOk=(vals.urteil==='pass')===rok;

      const dotVal=n2(V.dot(V.sub(P,sv),d));
      return { ok:tOk&&fOk&&dOk&&uOk, steps:[
        `g: x⃗ = ${V.str(sv)} + t · ${V.str(d)},   P = ${V.str(P)}`,
        ``,
        `Lotfußpunkt: (F − P) · d⃗ = 0`,
        `t = (P − sv) · d⃗ ÷ |d⃗|²`,
        `  = ${V.str(V.sub(P,sv))} · ${V.str(d)} ÷ ${n2(d2)}`,
        `  = ${dotVal} ÷ ${n2(d2)} = ${n2(tc)}`,
        tOk ? `✓ t korrekt` : `✗ t erwartet: ${n2(tc)}`,
        ``,
        `F = ${V.str(sv)} + ${n2(tc)} · ${V.str(d)} = ${V.str(Frnd)}`,
        fOk ? `✓ F korrekt` : `✗ F erwartet: ${V.str(Frnd)}`,
        ``,
        `|PF| = |${V.str(PFvec.map(x=>Math.round(x*100)/100))}| = ${n2(dist)} m`,
        dOk ? `✓ Abstand korrekt` : `✗ Abstand erwartet: ${n2(dist)} m`,
        ``,
        rok ? `${n2(dist)} m ≥ 3 m  →  Zulässig` : `${n2(dist)} m < 3 m  →  Nicht zulässig`,
        uOk ? `✓ Urteil korrekt` : `✗ Urteil falsch — erwartet: ${rok?'Zulässig':'Nicht zulässig'}`,
      ].join('\n')};
    }
  },

  G1: {
    cat:'Lagebeziehung', title:'Lagebeziehung zweier Seile',
    twoRopes: true,
    vorschrift:'§8b — Sich kreuzende Seile müssen gemeldet und mit einer Sicherheitsbrücke gesichert werden.',
    variant:'mc',
    genScen(rid){
      const rd=getRd2(rid); if(!rd) return {};
      const {sv1,sv2,d1,d2}=rd;
      const cross=V.cross(d1,d2), lc=V.len(cross);
      const isPar=lc<0.02;
      let isIntersect=false;
      if(!isPar){
        const dv=V.sub(sv2,sv1);
        outer: for(let i=0;i<3;i++) for(let j=i+1;j<3;j++){
          const det=d1[i]*(-d2[j])-d1[j]*(-d2[i]);
          if(Math.abs(det)>0.001){
            const tv=(dv[i]*(-d2[j])-dv[j]*(-d2[i]))/det;
            const sval=(d1[i]*dv[j]-d1[j]*dv[i])/det;
            const P1=V.add(sv1,V.sc(d1,tv)), P2=V.add(sv2,V.sc(d2,sval));
            if(V.len(V.sub(P1,P2))<0.05){ isIntersect=true; break outer; }
          }
        }
      }
      const lageStr={par:'Parallel (d⃗₁ × d⃗₂ ≈ 0⃗)',sch:'Schneidend (LGS → eindeutiger Schnittpunkt)',win:'Windschief (nicht parallel, kein Schnittpunkt)'};
      const lage=isPar?'par':(isIntersect?'sch':'win');
      return { mcOpts: shuffle([
        { text:lageStr.par, correct:isPar,
          expl:isPar?`d⃗₁ × d⃗₂ ≈ 0⃗ → parallel.`:`d⃗₁ × d⃗₂ = ${V.str(cross)} ≠ 0⃗ → nicht parallel.` },
        { text:lageStr.sch, correct:isIntersect,
          expl:isIntersect?`LGS liefert Schnittpunkt (Probe erfüllt).`:`LGS-Probe ergibt zwei verschiedene Punkte → kein Schnittpunkt.` },
        { text:lageStr.win, correct:!isPar&&!isIntersect,
          expl:!isPar&&!isIntersect?`Nicht parallel (|Kreuzprodukt| ≠ 0) und kein Schnittpunkt.`:`Widerspruch: ${lageStr[lage]} trifft zu.` },
        { text:'Identisch (beide Seile liegen auf derselben Geraden)', correct:false,
          expl:`Identisch bedeutet: ein Punkt von g₁ liegt auf g₂ UND gleiche Richtung — hier nicht der Fall.` },
      ])};
    },
    ctx(rid){
      const rd=getRd2(rid); if(!rd) return '';
      return `Vorschrift §8b: Schneidende Seile erfordern eine Sicherheitsbrücke.<br>
        g₁: x⃗ = ${V.str(rd.sv1)} + t · ${V.str(rd.d1)}<br>
        g₂: x⃗ = ${V.str(rd.sv2)} + s · ${V.str(rd.d2)}<br>
        Bestimme die Lagebeziehung der beiden Seilgeraden.`;
    },
    inputs:[
      { type:'radio', id:'lage', label:'Lagebeziehung',
        opts:[{v:'par',l:'Parallel'},{v:'sch',l:'Schneidend'},{v:'win',l:'Windschief'}] },
    ],
    check(rid, vals){
      const rd=getRd2(rid); if(!rd) return errR('Erst beide Seile wählen');
      const {sv1,sv2,d1,d2}=rd;
      const cross=V.cross(d1,d2), lenCross=V.len(cross);
      const isPar=lenCross<0.02;
      let isIntersect=false, tval=null, sval=null;
      const steps=[];

      if(isPar){
        steps.push(`d⃗₁ × d⃗₂ = ${V.str(cross)} ≈ 0⃗  →  parallel`);
      } else {
        steps.push(`d⃗₁ × d⃗₂ = ${V.str(cross)},  |…| = ${n2(lenCross)} ≠ 0  →  nicht parallel`);
        const dv=V.sub(sv2,sv1);
        let solved=false;
        for(let i=0;i<3&&!solved;i++){
          for(let j=i+1;j<3&&!solved;j++){
            const det=d1[i]*(-d2[j])-d1[j]*(-d2[i]);
            if(Math.abs(det)>0.001){
              tval=(dv[i]*(-d2[j])-dv[j]*(-d2[i]))/det;
              sval=(d1[i]*dv[j]-d1[j]*dv[i])/det;
              solved=true;
            }
          }
        }
        if(solved){
          const P1=V.add(sv1,V.sc(d1,tval));
          const P2=V.add(sv2,V.sc(d2,sval));
          const diff=V.len(V.sub(P1,P2));
          isIntersect=diff<0.05;
          const P1r=P1.map(x=>Math.round(x*100)/100);
          const P2r=P2.map(x=>Math.round(x*100)/100);
          steps.push(`LGS lösen:  t = ${n2(tval)},  s = ${n2(sval)}`);
          steps.push(`Probe g₁(t): ${V.str(P1r)}`);
          steps.push(`Probe g₂(s): ${V.str(P2r)}`);
          steps.push(isIntersect
            ? `Gleicher Punkt  →  Seile schneiden sich`
            : `Verschiedene Punkte  →  Seile sind windschief`);
        }
      }

      const lage=isPar?'par':(isIntersect?'sch':'win');
      const lageStr={par:'Parallel',sch:'Schneidend',win:'Windschief'};
      const ok=vals.lage===lage;
      steps.push('');
      steps.push(ok ? `✓ Korrekt: ${lageStr[lage]}` : `✗ Falsch — korrekt: ${lageStr[lage]}`);
      return { ok, steps:steps.join('\n') };
    }
  },

};

/* ══════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════ */
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function init(){
  STATE.load();
  initScene();
  // TÜV button locked state
  if(STATE.isTuevUnlocked()){
    document.getElementById('btn-tuev').classList.remove('locked');
  }
  updateProgBadge();
  // Start in missions phase, show list
  APP.phase='missions'; APP.mView='list';
  rebuild3();
  applyMissionHighlight({platforms:[0,1,2,3,4,5,6,7],showRopes:false});
  renderDrawer();
  if(!drawerOpen) toggleDrawer();
}

document.addEventListener('DOMContentLoaded', init);
</script>
